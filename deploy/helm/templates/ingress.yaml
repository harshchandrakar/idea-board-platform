{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: idea-board
  labels: {{- include "idea.labels" . | nindent 4 }}
spec:
  rules:
    # no host set -> match ALL traffic to the load balancer's IP (public by IP)
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port: { number: {{ .Values.service.backendPort }} }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: { number: {{ .Values.service.frontendPort }} }
{{- end }}
