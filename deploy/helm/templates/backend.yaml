apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels: {{- include "idea.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}   # static count only when autoscaling is off
  {{- end }}
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: {{ .Values.image.backend | quote }}
          ports:
            - containerPort: {{ .Values.service.backendPort }}
          env:
            - name: DATABASE_URL
              value: {{ .Values.databaseUrl | quote }}
          resources: {{- toYaml .Values.resources.backend | nindent 12 }}
          readinessProbe:
            httpGet: { path: /api/health, port: {{ .Values.service.backendPort }} }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector: { app: backend }
  ports:
    - port: {{ .Values.service.backendPort }}
      targetPort: {{ .Values.service.backendPort }}
