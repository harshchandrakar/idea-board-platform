{{- if not .Values.rollout.enabled }}
# Plain Deployment (default). When rollout.enabled = true, the backend is an Argo
# Rollout instead (see backend-rollout.yaml) — so this is skipped to avoid two
# controllers owning the same pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels: {{- include "idea.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}   # static count only when autoscaling is off
  {{- end }}
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: {{ .Values.image.backend | quote }}
          ports:
            - containerPort: {{ .Values.service.backendPort }}
          {{- if .Values.databaseUrl }}
          env:
            # Only injected when a real DB URL is provided (e.g. RDS). Left unset,
            # the backend falls back to a local SQLite file — no database to pay for.
            - name: DATABASE_URL
              value: {{ .Values.databaseUrl | quote }}
          {{- end }}
          resources: {{- toYaml .Values.resources.backend | nindent 12 }}
          readinessProbe:
            httpGet: { path: /api/health, port: {{ .Values.service.backendPort }} }
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
---
# Service is always present — it fronts either the Deployment or the Rollout pods
# (both carry the app: backend label), so nothing else has to change.
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector: { app: backend }
  ports:
    - port: {{ .Values.service.backendPort }}
      targetPort: {{ .Values.service.backendPort }}
