apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels: {{- include "idea.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}   # static count only when autoscaling is off
  {{- end }}
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: {{ .Values.image.frontend | quote }}
          ports:
            - containerPort: {{ .Values.service.frontendPort }}
          resources: {{- toYaml .Values.resources.frontend | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  # ClusterIP for prod (fronted by the Ingress); previews set LoadBalancer to get
  # their own public IP without touching the production release.
  type: {{ .Values.service.frontendType | default "ClusterIP" }}
  selector: { app: frontend }
  ports:
    - port: {{ .Values.service.frontendPort }}
      targetPort: {{ .Values.service.frontendPort }}
