services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idea
      POSTGRES_PASSWORD: idea
      POSTGRES_DB: ideas
    ports: ["5432:5432"]
    healthcheck:
      # Must name the DB (-d ideas); without it pg_isready probes a db called
      # "idea" (the username), which doesn't exist -> FATAL spam every 5s.
      test: ["CMD-SHELL", "pg_isready -U idea -d ideas"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./app/backend
    environment:
      DATABASE_URL: postgresql+psycopg2://idea:idea@db:5432/ideas
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./app/frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports: ["3000:80"]
    depends_on:
      - backend
