name: Deploy frontend
# Ships ONLY the frontend: build image -> push GHCR -> Helm-upgrade just the
# frontend (readiness-gated, --atomic auto-rollback) -> then the AI agent runs a
# CANARY health check and rolls back with a plain-English RCA if the app is broken.
# (Infra must exist first — run "Infra — provision cluster".)
on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "gcp (GKE) or aws (EKS)"
        type: choice
        options: [gcp, aws]
        default: gcp

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      SHA: ${{ github.sha }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install agent deps
        run: pip install -r ai/requirements.txt

      - name: Resolve registry (GHCR)
        run: echo "REG=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        run: |
          docker build -t "$REG/frontend:$SHA" -t "$REG/frontend:latest" app/frontend
          docker push "$REG/frontend:$SHA"; docker push "$REG/frontend:latest"

      - uses: azure/setup-helm@v4

      # --- point kubectl/Helm at the cluster ---
      - name: GCP auth (keyless)
        if: ${{ inputs.cloud == 'gcp' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: GKE kubeconfig
        if: ${{ inputs.cloud == 'gcp' }}
        uses: google-github-actions/get-gke-credentials@v2
        with: { cluster_name: idea-board, location: asia-south1-a }

      - name: AWS auth
        if: ${{ inputs.cloud == 'aws' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: EKS kubeconfig
        if: ${{ inputs.cloud == 'aws' }}
        run: aws eks update-kubeconfig --name idea-board --region "${{ secrets.AWS_REGION }}"

      # --- rollout (readiness-gated; --atomic auto-reverts if pods never get ready) ---
      - name: Helm upgrade (frontend)
        run: |
          helm upgrade --install idea deploy/helm \
            --set image.frontend="$REG/frontend:$SHA" \
            --set image.backend="$REG/backend:latest" \
            --wait --atomic --timeout 5m

      # --- AI canary: functional health check; rollback + RCA if the app is broken ---
      - name: AI canary check (agent verifies, rolls back with RCA)
        run: |
          kubectl -n idea port-forward svc/backend 8080:8000 >/tmp/pf.log 2>&1 &
          PF=$!
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/health 2>/dev/null || true)
            echo "health probe $i -> ${code:-none}"
            [ "$code" = "200" ] && break
            sleep 3
          done
          set +e
          python -m ai.agent canary --endpoint http://localhost:8080 --namespace idea
          RC=$?
          set -e
          kill $PF 2>/dev/null || true
          exit $RC
