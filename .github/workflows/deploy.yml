name: Deploy Idea Board
# Managed-cloud pipeline: build images -> generate & validate IaC from
# platform.json -> apply to the cloud -> canary -> the agent decides.
# Default cloud is GCP in Mumbai (asia-south1); GCP auth is KEYLESS (OIDC / WIF).
on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "which provider to deploy to"
        type: choice
        options: [gcp, aws]
        default: gcp
      environment:
        description: "staging or production"
        type: choice
        options: [staging, production]
        default: staging
      goal:
        description: "optional plain-English goal (feeds AI sizing)"
        required: false

jobs:
  # --------------------------------------------------------------------------
  # Build the app images and push them to GHCR (free).
  # --------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve registry (GHCR, override with REGISTRY secret)
        run: |
          if [ -n "${{ secrets.REGISTRY }}" ]; then REG="${{ secrets.REGISTRY }}";
          else REG="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"; fi
          echo "REG=$REG" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: startsWith(env.REG, 'ghcr.io')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images
        run: |
          docker build -t "$REG/backend:$SHA"  -t "$REG/backend:latest"  app/backend
          docker build -t "$REG/frontend:$SHA" -t "$REG/frontend:latest" app/frontend
          docker push "$REG/backend:$SHA";  docker push "$REG/backend:latest"
          docker push "$REG/frontend:$SHA"; docker push "$REG/frontend:latest"

  # --------------------------------------------------------------------------
  # Managed cloud: GKE/EKS via generated Terraform. Real infra, real cost
  # (GCP: covered by the $300 / 90-day trial credit). Region comes from
  # platform.json (gcp = asia-south1 / Mumbai).
  # --------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # id-token: write lets GitHub mint the OIDC token GCP exchanges for access —
    # this is what makes keyless (Workload Identity Federation) auth work.
    permissions:
      contents: read
      id-token: write
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve registry
        run: |
          if [ -n "${{ secrets.REGISTRY }}" ]; then REG="${{ secrets.REGISTRY }}";
          else REG="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"; fi
          echo "REG=$REG" >> "$GITHUB_ENV"

      # --- toolchain the gauntlet needs ---
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install python deps
        run: pip install -r ai/requirements.txt
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_wrapper: false }
      - name: Install conftest
        run: |
          V=0.56.0
          curl -sSL "https://github.com/open-policy-agent/conftest/releases/download/v${V}/conftest_${V}_Linux_x86_64.tar.gz" -o /tmp/c.tgz
          tar xzf /tmp/c.tgz -C /tmp && sudo mv /tmp/conftest /usr/local/bin/

      # --- cloud auth (only the matching one runs) ---
      - name: GCP credentials (keyless / OIDC — no key file)
        if: ${{ inputs.cloud == 'gcp' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: AWS credentials
        if: ${{ inputs.cloud == 'aws' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # (Advisory Gemini calls—summary/propose-config—are intentionally omitted here
      #  to conserve free-tier quota for the essential IaC generation below.)

      # --- Part C: generate IaC, then the validation gauntlet ---
      - name: Generate & validate IaC
        run: |
          python -m ai.iac_generator generate --provider ${{ inputs.cloud }} --env ${{ inputs.environment }}
          cd infra/generated/${{ inputs.cloud }}
          terraform init -input=false
          terraform fmt -check
          terraform validate
          terraform plan -out plan.bin
          terraform show -json plan.bin > plan.json
          conftest test plan.json --policy ../../policy
          python ../../../ai/iac_generator.py assert-nondestructive plan.json

      - name: Terraform apply (only if every gate passed)
        run: |
          cd infra/generated/${{ inputs.cloud }}
          terraform apply -auto-approve plan.bin
          terraform output -raw kubeconfig   > /tmp/kubeconfig
          terraform output -raw database_url > /tmp/dburl
          terraform output -raw app_endpoint > /tmp/endpoint

      - name: Canary deploy
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          python - <<'PY'
          from ai.canary import CanaryController
          import os
          CanaryController().start(f"{os.environ['REG']}/backend:{os.environ['SHA']}",
                                   f"{os.environ['REG']}/frontend:{os.environ['SHA']}",
                                   open("/tmp/dburl").read().strip())
          PY

      - name: Agent — analyse canary & decide (promote / repair / rollback)
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          python -m ai.agent canary --endpoint "$(cat /tmp/endpoint)"
