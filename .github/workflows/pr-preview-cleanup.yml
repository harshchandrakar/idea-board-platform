name: PR Preview Cleanup
# When a PR is merged or closed, delete its isolated preview environment.
# Deleting the namespace releases EVERYTHING the preview used — pods, the
# LoadBalancer (public IP), the PersistentVolume (disk), and secrets — so a
# merged PR never leaves resources billing in the background.
on:
  pull_request:
    types: [closed]   # fires on both merge and plain close

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: GCP auth (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: GKE kubeconfig
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: idea-board
          location: asia-south1-a
      - uses: azure/setup-helm@v4

      - name: Tear down the PR's preview (all resources)
        run: |
          NS="idea-pr-${PR_NUMBER}"
          echo "Removing preview namespace $NS ..."
          helm uninstall "$NS" -n "$NS" 2>/dev/null || true
          # Deleting the namespace removes pods, Services (incl. the LoadBalancer),
          # PVCs (disks), Secrets — everything the preview created.
          kubectl delete namespace "$NS" --ignore-not-found --wait=false

      - name: Comment on the PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: process.env.PR_NUMBER,
              body: `🧹 Preview \`idea-pr-${process.env.PR_NUMBER}\` and all its resources (pods, load balancer, disk) were deleted on PR close.`,
            });
