name: PR Preview Cleanup
# When a PR is merged or closed, delete its isolated preview environment.
# Deleting the namespace releases EVERYTHING the preview used — pods, the
# LoadBalancer (public IP), the PersistentVolume (disk), and secrets — so a
# merged PR never leaves resources billing in the background.
on:
  pull_request:
    types: [closed]   # fires on both merge and plain close

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4     # needed for scripts/gcp_lb_cleanup.sh
      - name: GCP auth (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: GKE kubeconfig
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: idea-board
          location: asia-south1-a
      - uses: azure/setup-helm@v4

      - name: Tear down the PR's preview (all resources, waited)
        run: |
          NS="idea-pr-${PR_NUMBER}"
          if ! kubectl get ns "$NS" >/dev/null 2>&1; then
            echo "No preview namespace $NS — nothing to clean."; exit 0
          fi
          echo "Removing preview $NS and its cloud resources ..."

          # 1) Delete Services FIRST and WAIT. The LoadBalancer Service has a
          #    finalizer that blocks deletion until GKE releases the cloud load
          #    balancer + external IP — this is what prevents orphaned LB/IP.
          kubectl delete svc --all -n "$NS" --wait=true --timeout=180s 2>/dev/null || true

          # 2) Remove the Helm release (Deployments, Postgres, Secret, PVC object).
          helm uninstall "$NS" -n "$NS" 2>/dev/null || true

          # 3) Delete the namespace and WAIT — this releases the Postgres PVC's
          #    underlying disk (reclaimPolicy Delete on the default StorageClass).
          kubectl delete namespace "$NS" --ignore-not-found --wait=true --timeout=300s || true

          # 4) Safety net: sweep any GKE-orphaned load-balancer bits (rare for L4,
          #    but belt-and-suspenders so nothing lingers billing).
          bash scripts/gcp_lb_cleanup.sh || true

          echo "=== verify nothing remains for $NS ==="
          kubectl get ns "$NS" 2>/dev/null && echo "note: namespace still terminating in background" || echo "namespace gone ✅"

      - name: Comment on the PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: process.env.PR_NUMBER,
              body: `🧹 Preview \`idea-pr-${process.env.PR_NUMBER}\` and all its resources (pods, load balancer, disk) were deleted on PR close.`,
            });
