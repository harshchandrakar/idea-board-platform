name: Deploy backend
# Ships the backend. Two modes:
#   progressive_canary = off (default): rolling deploy, readiness-gated + --atomic,
#     then a kubectl-based AI health check that rolls back with an RCA if broken.
#   progressive_canary = on: Argo Rollouts shifts traffic 20% -> 50% -> 100% with
#     Prometheus success-rate analysis between steps; on abort it auto-rolls-back
#     and the AI writes the root-cause. Requires Argo Rollouts + Prometheus (CANARY.md).
on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "gcp (GKE) or aws (EKS)"
        type: choice
        options: [gcp, aws]
        default: gcp
      progressive_canary:
        description: "on = Argo Rollouts progressive canary; off = rolling deploy"
        type: choice
        options: ["off", "on"]
        default: "off"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      SHA: ${{ github.sha }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so the RCA can diff the failing commit
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install agent deps
        run: pip install -r ai/requirements.txt

      - name: Resolve registry (GHCR)
        run: echo "REG=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        run: |
          docker build -t "$REG/backend:$SHA" -t "$REG/backend:latest" app/backend
          docker push "$REG/backend:$SHA"; docker push "$REG/backend:latest"

      - uses: azure/setup-helm@v4

      # --- point kubectl/Helm at the cluster ---
      - name: GCP auth (keyless)
        if: ${{ inputs.cloud == 'gcp' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: GKE kubeconfig
        if: ${{ inputs.cloud == 'gcp' }}
        uses: google-github-actions/get-gke-credentials@v2
        with: { cluster_name: idea-board, location: asia-south1-a }

      - name: AWS auth
        if: ${{ inputs.cloud == 'aws' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: EKS kubeconfig
        if: ${{ inputs.cloud == 'aws' }}
        run: aws eks update-kubeconfig --name idea-board --region "${{ secrets.AWS_REGION }}"

      # capture the currently-running backend version so the RCA can diff against it
      - name: Record current version (for change-aware RCA)
        if: ${{ inputs.progressive_canary == 'on' }}
        run: |
          IMG=$(kubectl get rollout backend -n idea -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)
          echo "PREV_SHA=${IMG##*:}" >> "$GITHUB_ENV"
          echo "previously-deployed backend: ${IMG:-none}"

      # --- deploy ---
      - name: Helm upgrade (backend)
        run: |
          if [ "${{ inputs.progressive_canary }}" = "on" ]; then
            # Argo Rollouts drives the progression, so no --wait/--atomic here.
            helm upgrade --install idea deploy/helm -n idea --create-namespace \
              --set image.backend="$REG/backend:$SHA" \
              --set image.frontend="$REG/frontend:latest" \
              --set rollout.enabled=true --timeout 5m
          else
            helm upgrade --install idea deploy/helm -n idea --create-namespace \
              --set image.backend="$REG/backend:$SHA" \
              --set image.frontend="$REG/frontend:latest" \
              --wait --atomic --timeout 5m
          fi

      # --- PROGRESSIVE CANARY: watch Argo shift traffic; AI RCA on abort ---
      - name: Progressive canary (watch + AI RCA)
        if: ${{ inputs.progressive_canary == 'on' }}
        run: |
          echo "Watching the canary shift 20% -> 50% -> 100% (Prometheus-gated)..."
          for i in $(seq 1 60); do
            PHASE=$(kubectl get rollout backend -n idea -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            echo "rollout phase: ${PHASE:-Progressing}"
            case "$PHASE" in
              Healthy)  echo "[canary] promoted to 100% ✅"; exit 0 ;;
              Degraded) echo "[canary] error rate too high -> aborted & rolled back ❌"
                        python -m ai.agent rca --namespace idea \
                          --prev-sha "${PREV_SHA:-}" --sha "$SHA" || true
                        exit 1 ;;
            esac
            sleep 15
          done
          echo "[canary] timed out; current state:"
          kubectl describe rollout backend -n idea | tail -40 || true
          exit 1

      # --- ROLLING DEPLOY (default): kubectl health check + AI RCA on failure ---
      - name: AI canary check (rolling deploy)
        if: ${{ inputs.progressive_canary == 'off' }}
        run: |
          echo "=== pods ===";      kubectl get pods -n idea -o wide || true
          HEALTHY=1
          kubectl rollout status deployment/backend -n idea --timeout=150s || HEALTHY=0
          if [ "$HEALTHY" = "1" ]; then
            kubectl -n idea exec deploy/backend -- \
              python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/ideas', timeout=5)" \
              || HEALTHY=0
          fi
          if [ "$HEALTHY" = "1" ]; then
            echo "[canary] app healthy -> keep"; exit 0
          fi
          echo "[canary] app UNHEALTHY -> logs + AI root-cause + rollback"
          kubectl logs deploy/backend -n idea --tail=80 || true
          python -m ai.agent canary --endpoint http://localhost:8000 --namespace idea || true
          exit 1
