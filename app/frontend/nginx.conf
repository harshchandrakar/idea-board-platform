server {
  listen 80;

  # Proxy API calls to the backend Service in the SAME namespace. This makes the
  # frontend self-sufficient: the one LoadBalancer serves the UI *and* the API,
  # so an isolated preview (frontend + backend + its own Postgres) works end-to-end
  # from a single IP — no Ingress needed. "backend" resolves per-namespace via
  # cluster DNS, so prod and each preview each hit their own backend.
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
